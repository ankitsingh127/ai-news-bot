name: Daily AI News Aggregator

on:
  schedule:
    # 2:30 AM UTC is exactly 8:00 AM IST
    - cron: '30 2 * * *'
  workflow_dispatch: # Ye button dega taaki tum manually bhi test kar sako

jobs:
  run-aggregator:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Stable version

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Main Script
        env:
          # GitHub Secrets se hum apni actual keys securely pass karenge
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py